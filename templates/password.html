<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso protegido — {{ file.name }}</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --border: #2e3347;
  --accent: #6c63ff; --text: #e8eaf0; --muted: #8b90a7;
  --danger: #ef4444;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center;
}
.icon { font-size: 48px; margin-bottom: 20px; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
p { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; color: var(--text);
  font-size: 15px; font-family: inherit; outline: none; transition: border 0.15s;
  margin-bottom: 14px; text-align: center; letter-spacing: 2px;
}
input:focus { border-color: var(--accent); }
input.error { border-color: var(--danger); }
.error-msg { color: var(--danger); font-size: 13px; margin-bottom: 14px; }
button {
  width: 100%; background: var(--accent); color: #fff; border: none;
  border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
button:hover { opacity: 0.9; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <h1>{{ file.name }}</h1>
  <p>Este arquivo está protegido por senha.<br>Insira a senha para visualizar.</p>
  <form method="POST">
    <input type="password" name="password" placeholder="••••••••"
           {% if error %}class="error"{% endif %} autofocus required>
    {% if error %}
    <div class="error-msg">Senha incorreta. Tente novamente.</div>
    {% endif %}
    <button type="submit">Acessar →</button>
  </form>
</div>
</body>
</html>
